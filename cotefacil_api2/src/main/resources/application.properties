spring.application.name=cotefacil_api2
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
server.port=${PORT:8081}
server.servlet.context-path=/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.br.com.cotefacil_api2=INFO
jwt.secret=${JWT_SECRET:test-jwt-secret-test-jwt-secret-32b}
jwt.issuer=${JWT_ISSUER:br.com.cotefacil_api1}
jwt.audience=${JWT_AUDIENCE:backend-clients}
