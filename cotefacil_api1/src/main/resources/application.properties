spring.application.name=cotefacil_api1
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
# JWT (via environment variables)
# Purpose: user/admin authentication.
jwt.secret=${JWT_SECRET:test-jwt-secret-test-jwt-secret-32b}
jwt.expiration=${JWT_EXPIRATION:3600000}
jwt.issuer=${JWT_ISSUER:br.com.cotefacil_api1}
jwt.audience=${JWT_AUDIENCE:backend-clients}
# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
# Server
server.port=${PORT:8080}
server.servlet.context-path=/
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
# Logging
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.br.com.cotefacil_api1=INFO
# Rate limiting (login)
rate.limit.login.capacity-per-minute=${LOGIN_RATE_LIMIT_PER_MINUTE:10}
# API 2
api2.base-url=${API2_BASE_URL:http://localhost:8081}