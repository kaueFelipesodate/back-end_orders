spring.datasource.url=jdbc:h2:mem:cotefacil;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

app.cors.allowed-origins=http://localhost:3000
jwt.secret=test-jwt-secret-test-jwt-secret-32b
jwt.expiration=3600000
jwt.issuer=br.com.cotefacil_api1
jwt.audience=backend-clients
api2.base-url=http://localhost:8081
rate.limit.login.capacity-per-minute=10
